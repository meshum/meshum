services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meshum_dev
    ports:
      - "5432:5432"
    volumes:
      - meshum-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meshum_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  meshum-postgres-data:
