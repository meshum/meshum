name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build a release for (e.g. v0.1.0)'
        required: true
        type: string

permissions: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
        run: |
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git-cliff --github-repo "${{ github.repository }}" \
            --latest --strip all \
            --output RELEASE_NOTES.md

      - name: Build release body
        env:
          EXISTING_BODY: ${{ github.event.release.body }}
        run: |
          if [ -n "$EXISTING_BODY" ]; then
            printf '%s\n\n' "$EXISTING_BODY" > RELEASE_BODY.md
          else
            : > RELEASE_BODY.md
          fi
          cat RELEASE_NOTES.md >> RELEASE_BODY.md

      # Upserts: updates the release on the release event, creates one when
      # running manually against a tag that has no release yet.
      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          bodyFile: RELEASE_BODY.md
          omitNameDuringUpdate: true
          omitDraftDuringUpdate: true
          omitPrereleaseDuringUpdate: true

  daemon:
    name: Daemon (linux-x86_64)
    needs: changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # To add another platform later, turn TARGET/ARCHIVE (and the runner)
    # into a build matrix; the steps below are already target-agnostic.
    env:
      TARGET: x86_64-unknown-linux-gnu
      ARCHIVE: meshum_daemon-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.changelog.outputs.tag }}

      - name: Install Rust toolchain
        working-directory: daemon
        run: |
          rustup toolchain install
          rustup target add "$TARGET"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon

      - name: Set version in Cargo.toml
        working-directory: daemon
        run: |
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"${{ needs.changelog.outputs.version }}\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Build
        working-directory: daemon
        run: cargo build --release --target "$TARGET" --package meshum_daemon

      - name: Package
        run: |
          mkdir dist
          cp "daemon/target/${TARGET}/release/meshum_daemon" dist/
          cp LICENSE.md dist/
          tar -czf "$ARCHIVE" -C dist meshum_daemon LICENSE.md

      - name: Upload artifact to release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.changelog.outputs.tag }}
          artifacts: ${{ env.ARCHIVE }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitDraftDuringUpdate: true
          omitPrereleaseDuringUpdate: true

  server:
    name: Server (linux-x86_64)
    needs: changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MIX_ENV: prod
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.changelog.outputs.tag }}

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          otp-version: '29'
          elixir-version: '1.20.2'

      # Mainly caches the compiled prod deps (the Phoenix stack); our own
      # apps recompile anyway because the version stamp touches mix.exs.
      # Assembled releases are excluded, they must always be rebuilt.
      - uses: actions/cache@v5
        with:
          path: |
            server/deps
            server/_build
            !server/_build/prod/rel
          key: mix-prod-${{ runner.os }}-otp${{ steps.beam.outputs.otp-version }}-ex${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-prod-${{ runner.os }}-otp${{ steps.beam.outputs.otp-version }}-ex${{ steps.beam.outputs.elixir-version }}-

      - name: Set version in mix.exs
        run: |
          sed -E -i 's/version: "[0-9][^"]*"/version: "${{ needs.changelog.outputs.version }}"/' mix.exs apps/*/mix.exs

      - name: Install hex & rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get --only prod

      - name: Compile
        run: mix compile

      - name: Build assets
        working-directory: server/apps/meshum_web
        run: |
          mix assets.setup
          mix assets.deploy

      - name: Assemble releases
        run: |
          mix release meshum_gateway --overwrite
          mix release meshum_web --overwrite

      - name: Package
        run: |
          cp ../LICENSE.md _build/prod/rel/meshum_gateway/
          cp ../LICENSE.md _build/prod/rel/meshum_web/
          tar -czf meshum_gateway-linux-x86_64.tar.gz -C _build/prod/rel meshum_gateway
          tar -czf meshum_web-linux-x86_64.tar.gz -C _build/prod/rel meshum_web

      - name: Upload artifacts to release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.changelog.outputs.tag }}
          artifacts: 'server/meshum_gateway-linux-x86_64.tar.gz,server/meshum_web-linux-x86_64.tar.gz'
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitDraftDuringUpdate: true
          omitPrereleaseDuringUpdate: true
