name: CLA

# Contributor Assistant Lite (SAP, https://github.com/cla-assistant/github-action).
# Gates pull requests on a signed CLA before they can be merged.
#
# Notes on the trigger:
#   - We use `pull_request_target` (not `pull_request`) because the bot must be able to
#     post its "please sign" comment on PRs opened from forks, where the `pull_request`
#     token is read-only. This is safe: the action only inspects PR metadata and posts a
#     comment — it NEVER checks out or executes the pull request's code, which is the
#     supply-chain risk `pull_request_target` is normally associated with.
#   - `issue_comment` lets a maintainer or contributor retrigger the check by commenting
#     `recheck`, and is also how the contributor's signature is recorded (the action
#     watches for its magic sign comment).

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

# Least-privilege for the workflow's GITHUB_TOKEN. The signature file is committed by the
# PERSONAL_ACCESS_TOKEN (CLA_PAT) below, so this token only needs enough to comment on the
# PR and report the status check.
permissions:
  actions: read
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: cla-${{ github.event.pull_request.number || github.event.comment.id }}
  cancel-in-progress: true

jobs:
  CLAAssistant:
    name: "CLA Assistant"
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: >
          (github.event_name == 'issue_comment' &&
           (github.event.comment.body == 'recheck' ||
            github.event.comment.body == 'I have read the CLA Document and hereby sign the CLA')) ||
          github.event_name == 'pull_request_target'
        uses: cla-assistant/github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Signature store: a JSON file committed to master by the PAT.
          path-to-signatures: '.github/cla/signatures.json'
          # The CLA contributors read and agree to (the ICLA; the CCLA is linked from it
          # and from docs/legal/README.md for corporate contributors).
          path-to-document: 'https://github.com/meshum/meshum/blob/master/docs/legal/icla.md'
          branch: 'master'
          # Bots and automation that are exempt from signing. Wildcards (e.g. "*-bot") may
          # also be used; extend this list if you add more automation accounts.
          allowlist: 'dependabot[bot],github-actions[bot],renovate[bot],pre-commit-ci[bot]'
