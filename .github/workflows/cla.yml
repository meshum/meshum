name: CLA

# ──────────────────────────────────────────────────────────────────────────
# Privileged CLA workflow — runs on the default branch (master) with a
# write-capable GITHUB_TOKEN. Handles two triggers:
#
#   workflow_run   Consumes the artifact from "CLA Check" and creates the
#                  CLA check run (pass/fail). If the author has not signed,
#                  posts a "please sign" comment (deduplicated).
#
#   issue_comment  When a contributor comments the exact magic phrase, appends
#                  their signature to .github/cla/signatures.json and flips
#                  the check to green. "recheck" re-evaluates without signing.
#
# Security model:
#   - Neither trigger ever checks out PR code.
#   - The only untrusted input is the comment body, compared with == after
#     trimming — never interpolated into scripts (all context values are
#     passed through env vars per GitHub's script-injection guidance).
#   - This workflow does NOT use pull_request_target.
#   - The workflow_run artifact is produced by our own code reading trusted
#     data (signatures from master + GitHub-validated PR metadata).
#
# All logic lives in .github/cla/{gate,sign}.sh — see those files for
# detailed documentation.
#
# https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CLA Check"]
    types: [completed]
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write
  pull-requests: write
  checks: write

jobs:
  # ── Gate: translate the unprivileged check result into a check run ──────
  gate:
    name: Gate
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'CLA Check' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download check result
        uses: actions/download-artifact@v8
        with:
          name: cla-result
          path: ${{ runner.temp }}/cla-result
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create check run and post comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/cla/gate.sh

  # ── Sign: process the contributor's sign / recheck comment ─────────────
  sign:
    name: Sign
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      (contains(github.event.comment.body, 'CLA Document') ||
       github.event.comment.body == 'recheck')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Process comment
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTER: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR_AUTHOR: ${{ github.event.issue.user.login }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: bash .github/cla/sign.sh
